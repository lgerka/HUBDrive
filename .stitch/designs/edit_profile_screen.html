<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e69e19",
                        "background-light": "#ffffff",
                        "background-dark": "#211b11",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top Navigation -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-100 dark:border-slate-800">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center hover:bg-slate-50 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Редактировать профиль</h2>
<div class="flex w-10 items-center justify-end">
<button class="text-primary text-base font-bold leading-normal tracking-tight hover:opacity-80 transition-opacity">
                    Готово
                </button>
</div>
</div>
<!-- App Logo Section -->
<div class="flex flex-col items-center justify-center py-8 px-4">
<img alt="Hub Drive Logo" class="h-12 w-auto object-contain mb-6" data-alt="Hub Drive company logo in orange and black" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCICiO-SCom2yxw-iU_UBaQFkaGHLRb1craUYveLhdAY6pmST1n2vdBCeK1eJA1V_3DQY7q8bJGVpg8YDKu0vxp7Ew2mEXaIgAns-KDMaPg40e8igD-CwwLIA45HCylI6CrWbE0ojSJWzA7j8ZeB_7byNsJtmlHjxlX4LJcVoAipEJaL7LIYtpnyMIfS-0-h_zIDYr6WLBcD73heXe8fIpb40WDjRjfuYANEO59tgBBdfGubscn0RPU1o7dUjyYG_AZLUpr4VJboMsl"/>
<!-- Profile Photo Upload -->
<div class="relative group">
<div class="bg-slate-100 dark:bg-slate-800 bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 border-4 border-white dark:border-slate-900 shadow-sm overflow-hidden" data-alt="User profile placeholder image circular avatar" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAZB-6iSW8ixdK5ZhqOAFKfQ0BKwtrQArONy7nKtK1PIwAbnHN-fzKUUszbBzZXLqbmJNUrQTCOtE7zoxOZ8kXf2FU9dS41ZGMUjJ33mzbPmY2vQlo-xZd9H8jm9diHpjmjoVVVb5bSARyEXuzYd2O4l4e-XmJf0DISYO2UN_B5WkCc6TyNL7f_vWQzjfaaGjHFJgU02oF-LKStDt3i3s4K0EGXKRTHDA2J2FQ4FA-i60vqK9zgJ--eWqOmCYHRkp1QR7vQLHCCmrme');">
</div>
<button class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-lg hover:scale-105 transition-transform flex items-center justify-center">
<span class="material-symbols-outlined text-sm" style="font-size: 20px;">photo_camera</span>
</button>
</div>
<p class="text-primary text-sm font-semibold mt-4 cursor-pointer hover:underline">Изменить фото</p>
</div>
<!-- Form Fields -->
<div class="flex flex-col gap-1 px-4 max-w-md mx-auto w-full">
<!-- Name Field -->
<div class="flex flex-wrap items-end gap-2 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pb-1.5 pl-1">Имя</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" placeholder="Введите ваше имя" type="text" value="Александр Петров"/>
</div>
</label>
</div>
<!-- Phone Number Field -->
<div class="flex flex-wrap items-end gap-2 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pb-1.5 pl-1">Номер телефона</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" placeholder="+7 (000) 000-00-00" type="tel" value="+7 (999) 123-45-67"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400" data-icon="phone">call</span>
</div>
</label>
</div>
<!-- City Field -->
<div class="flex flex-wrap items-end gap-2 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal pb-1.5 pl-1">Город</p>
<div class="relative">
<input class="form-input flex w-full min-w-0 flex-1 rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-primary h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal transition-all" placeholder="Выберите город" type="text" value="Москва"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400" data-icon="location_on">location_on</span>
</div>
</label>
</div>
</div>
<!-- Save Button (Mobile Bottom) -->
<div class="mt-auto p-4 max-w-md mx-auto w-full">
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Сохранить изменения
            </button>
</div>
<!-- Extra spacing for scrolling -->
<div class="h-8 bg-transparent"></div>
</div>
</body></html>
